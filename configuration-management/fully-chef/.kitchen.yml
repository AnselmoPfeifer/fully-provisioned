---
driver:
  name: vagrant

driver_config:
  requre_chef_omnibus: true
  network:
  - ['forwarded_port', { guest: 8080, host: 8080 }]

  customize:
    cpus: 1
    memory: 512
  synced_folders:
    - ['../assets', '/tmp/assets']

provisioner:
  name: chef_solo
  require_chef_omnibus: 12.20.3

platforms:
  - name: ubuntu-16.04

suites:
  - name: default
    driver:
      log_level: :debug
